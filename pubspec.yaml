name: ironlog
description: Personal offline gym tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.4.1
  path: ^1.9.1
  flutter_riverpod: ^2.6.1
  fl_chart: ^0.70.2
  dio: ^5.7.0
  connectivity_plus: ^6.1.4
  workmanager: ^0.9.0
  flutter_local_notifications: ^22.0.1
  intl: ^0.20.2
  shared_preferences: ^2.3.4
  flutter_svg: ^2.0.17
  google_fonts: ^6.2.1
  vibration: ^3.2.0
  confetti: ^0.8.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/exercises/
    - assets/images/muscle_diagrams/
